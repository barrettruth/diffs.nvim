name: quality

on:
  workflow_call:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  changes:
    runs-on: [self-hosted, linux, x64, netcup, general]
    permissions:
      pull-requests: read
    outputs:
      lua: ${{ steps.changes.outputs.lua }}
      markdown: ${{ steps.changes.outputs.markdown }}
      vimdoc: ${{ steps.changes.outputs.vimdoc }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          working-directory: repo
          filters: |
            lua:
              - 'lua/**'
              - 'plugin/**'
              - '*.lua'
              - '.luarc.json'
              - '*.toml'
              - 'vim.yaml'
            markdown:
              - '*.md'
            vimdoc:
              - 'doc/**'

  lua-format:
    name: Lua Format Check
    runs-on: [self-hosted, linux, x64, netcup, general]
    needs: changes
    if: ${{ needs.changes.outputs.lua == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo
      - uses: cachix/install-nix-action@v31
      - run: nix develop .#ci --command stylua --check .
        working-directory: repo

  lua-lint:
    name: Lua Lint Check
    runs-on: [self-hosted, linux, x64, netcup, general]
    needs: changes
    if: ${{ needs.changes.outputs.lua == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo
      - uses: cachix/install-nix-action@v31
      - run: nix develop .#ci --command selene --display-style quiet .
        working-directory: repo

  lua-typecheck:
    name: Lua Type Check
    runs-on: [self-hosted, linux, x64, netcup, general]
    needs: changes
    if: ${{ needs.changes.outputs.lua == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo
      - name: Run Lua LS Type Check
        uses: mrcjkb/lua-typecheck-action@v0
        with:
          checklevel: Warning
          directories: repo/lua
          configpath: repo/.luarc.json

  vimdoc-check:
    name: Vimdoc Check
    runs-on: [self-hosted, linux, x64, netcup, general]
    needs: changes
    if: ${{ needs.changes.outputs.vimdoc == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo
      - uses: cachix/install-nix-action@v31
      - run: nix develop .#ci --command vimdoc-language-server check doc/
        working-directory: repo

  markdown-format:
    name: Markdown Format Check
    runs-on: [self-hosted, linux, x64, netcup, general]
    needs: changes
    if: ${{ needs.changes.outputs.markdown == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo
      - uses: cachix/install-nix-action@v31
      - run: nix develop .#ci --command prettier --check .
        working-directory: repo
